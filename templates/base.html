<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "Student Grading System" }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f5f5; }
        .container-box {
            background: white;
            padding: 25px;
            margin-top: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ddd;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">Student Grading System</span>

        <div>
            <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
            <a href="/students" class="btn btn-light btn-sm">Students</a>
            <a href="/add" class="btn btn-warning btn-sm">Add Student</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container container-box">
    {% block content %}{% endblock %}
</div>

</body>
</html>
