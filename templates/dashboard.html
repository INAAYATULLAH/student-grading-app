<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { 
            font-family: Arial, sans-serif;
            background: #eef1f7;
            padding: 40px;
            text-align: center;
        }
        .box {
            background: white;
            width: 60%;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
        }
        a.btn {
            display: block;
            padding: 15px;
            margin: 15px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
        }
        a.btn:hover { background: #0056b3; }
        h2 { color: #333; }
    </style>
</head>
<body>

<div class="box">
    <h2>📘 Teacher Dashboard</h2>
    <a href="/add" class="btn">➕ Add New Student</a>
    <a href="/students" class="btn">📄 View All Students</a>
    <a href="/logout" class="btn" style="background:#dc3545;">⛔ Logout</a>
</div>

</body>
</html>
